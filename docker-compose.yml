services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: capman
      POSTGRES_PASSWORD: capman
      POSTGRES_DB: capman
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capman"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./start.sh"]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      DOCKER: "true"
      VITE_API_URL: "/api"
    depends_on:
      - backend
    command: ["sh", "-c", "npm install && npx vite --host 0.0.0.0 --port 5173"]

volumes:
  pgdata:
