# Staging override — run with:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up --build
#
# Uses separate volumes so staging data doesn't collide with local dev.

services:
  db:
    volumes:
      - pgdata_staging:/var/lib/postgresql/data

  backend:
    environment:
      APP_ENV: staging
      SEED_ON_STARTUP: "true"
      INGEST_ON_STARTUP: "true"

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_ENV: staging
        VITE_API_URL: /api
    command: ["sh", "-c", "npm install && npx vite --host 0.0.0.0 --port 5173"]

volumes:
  pgdata_staging:
